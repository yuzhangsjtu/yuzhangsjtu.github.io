<!--
  Stat grid snippet · Yohaku design system
  Use for owner dashboard, post stats, profile cards.
  Tokens: --color-neutral-{2,7,10}, --color-accent, --color-border, --font-serif.
-->
<section style="
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px;
  padding: 24px 0;
">
  <article style="
    background: var(--color-neutral-2);
    border: 1px solid var(--color-border);
    border-radius: 8px;
    padding: 16px 20px;
  ">
    <p style="
      margin: 0 0 4px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--color-neutral-7);
    ">posts</p>
    <p style="
      margin: 0;
      font-family: var(--font-serif);
      font-size: 2rem;
      font-weight: 500;
      color: var(--color-neutral-10);
      font-variant-numeric: tabular-nums;
    ">128</p>
  </article>

  <article style="
    background: var(--color-neutral-2);
    border: 1px solid var(--color-border);
    border-radius: 8px;
    padding: 16px 20px;
  ">
    <p style="
      margin: 0 0 4px;

    <p style="

      font-family: var(--font-serif);
      font-size: 2rem;
      font-weight: 500;
      color: var(--color-neutral-10);
      font-variant-numeric: tabular-nums;
    ">412</p>
  </article>

  <article style="
    background: var(--color-neutral-2);

    border-radius: 8px;
    padding: 16px 20px;
  ">
    <p style="
      margin: 0 0 4px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--color-neutral-7);
    ">comments</p>
    <p style="
      margin: 0;
      font-family: var(--font-serif);

      font-weight: 500;
      color: var(--color-accent);

      font-weight: 500;
      color: var(--color-neutral-10);
      font-variant-numeric: tabular-nums;
    ">2,103</p>
  </article>
</section>
