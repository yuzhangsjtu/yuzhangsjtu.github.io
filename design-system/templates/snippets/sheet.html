<!--
  Sheet snippet · Yohaku design system (mobile-leaning bottom sheet)
  Tokens: --color-paper, --color-neutral-{4,7,9,10}, --color-border.
-->
<div style="
  position: fixed;
  inset: 0;
  background: color-mix(in srgb, var(--color-neutral-10) 30%, transparent);
  backdrop-filter: blur(40px);
  -webkit-backdrop-filter: blur(40px);
  z-index: 50;
">
  <div style="
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    background: var(--color-paper);
    border-top-left-radius: 16px;
    border-top-right-radius: 16px;
    padding: 12px 24px 32px;
    box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.05);
    max-height: 75vh;
    overflow-y: auto;
  ">
    <div style="
      width: 36px;
      height: 4px;
      background: var(--color-neutral-4);
      border-radius: 2px;
      margin: 0 auto 16px;
    "></div>

    <h2 style="
      margin: 0 0 8px;
      font-size: 1.125rem;
      font-weight: 500;
      color: var(--color-neutral-10);
    ">分享此条</h2>
    <p style="margin: 0 0 16px; color: var(--color-neutral-7); line-height: 1.55;">
      择其一以分享。
    </p>

    <ul style="list-style: none; margin: 0; padding: 0; display: grid; gap: 8px;">
      <li><button style="
        width: 100%;
        text-align: left;
        background: transparent;
        border: 1px solid var(--color-border);
        border-radius: 8px;
        padding: 12px 16px;
        color: var(--color-neutral-9);
        font: inherit;
        cursor: pointer;
      ">复制链接</button></li>
      <li><button style="
        width: 100%;
        text-align: left;
        background: transparent;
        border: 1px solid var(--color-border);
        border-radius: 8px;
        padding: 12px 16px;
        color: var(--color-neutral-9);
        font: inherit;
        cursor: pointer;
      ">分享至 Twitter</button></li>
      <li><button style="
        width: 100%;
        text-align: left;
        background: transparent;
        border: 1px solid var(--color-border);
        border-radius: 8px;
        padding: 12px 16px;
        color: var(--color-neutral-9);
        font: inherit;
        cursor: pointer;
      ">导出为 markdown</button></li>
    </ul>
  </div>
</div>
