<!--
  Hero snippet · Yohaku design system
  Copy into <main class="mockup-shell"> of scaffold.html.
  Tokens used: --color-neutral-{2,7,9,10}, --color-accent, --font-serif.
-->
<section style="
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
  padding: 48px 0;
  border-bottom: 1px solid var(--color-border);
">
  <p style="
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--color-accent);
    margin: 0;
  ">余白 · Yohaku</p>

  <h1 style="
    margin: 0;
    font-family: var(--font-serif);
    font-size: 2.25rem;
    font-weight: 500;
    line-height: 1.15;
    color: var(--color-neutral-10);
  ">题如其志，留余白以载所思</h1>

  <p style="
    margin: 0;
    font-size: 1.125rem;
    line-height: 1.55;
    color: var(--color-neutral-7);
    max-width: 56ch;
  ">字字皆择，色不溢于五分。Yohaku 之主页若纸：执三档 neutral，载一抹 accent，余者尽留为白。</p>

  <div style="display: flex; gap: 12px; align-items: center; padding-top: 8px;">
    <button style="
      background: var(--color-accent);
      color: #ffffff;
      border: none;
      border-radius: 6px;
      padding: 10px 20px;
      font: inherit;
      font-weight: 500;
      cursor: pointer;
    ">访 posts</button>

    <button style="
      background: var(--color-neutral-2);
      color: var(--color-neutral-9);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      padding: 10px 20px;
      font: inherit;
      font-weight: 500;
      cursor: pointer;
    ">关于</button>
  </div>
</section>
